
<!doctype html><html><head>
<meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>IoT Premium V3</title>
<link rel='stylesheet' href='style.css'>
<script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
</head><body>
<div class='wrap'>
<div class='header'><h2>⚡ IoT Premium V3</h2><div class='badge'>ONLINE</div></div>

<div class='cards'>
<div class='card'><div class='label'>Temperature</div><div class='value' id='suhu'>--</div></div>
<div class='card'><div class='label'>Humidity</div><div class='value' id='hum'>--</div></div>
<div class='card'><div class='label'>Voltage</div><div class='value' id='volt'>--</div></div>
<div class='card'><div class='label'>Power</div><div class='value' id='power'>--</div></div>
<div class='card'><div class='label'>WiFi</div><div class='value' id='wifi'>--</div></div>
</div>

<div class='grid'>
<div class='panel'><canvas id='chart'></canvas></div>
<div class='panel'>
<h3>Alert Center</h3>
<div id='alertBox'></div>
<h3>Threshold</h3>
<input id='th' type='range' min='25' max='35' step='0.5' style='width:100%'>
<div id='thText'></div>
</div>
</div>

<div class='panel'>
<h3>Realtime Logs</h3>
<table><thead><tr><th>Time</th><th>Suhu</th><th>Humidity</th></tr></thead><tbody id='logs'></tbody></table>
</div>
</div>

<script>
const c=new Chart(document.getElementById('chart'),{
type:'line',
data:{labels:[],datasets:[{label:'Suhu',data:[]},{label:'Humidity',data:[]}]} });

async function load(){
const r=await fetch('/api/status'); const d=await r.json();
suhu.innerText=d.suhu+'°C'; hum.innerText=d.kelembapan+'%';
volt.innerText=d.voltage.toFixed(1)+'V'; power.innerText=d.power.toFixed(0)+'W';
wifi.innerText=d.wifi.toFixed(0)+' dBm';
th.value=d.threshold; thText.innerText='Threshold '+d.threshold+'°C';

alertBox.innerHTML=d.suhu>=d.threshold?
'<div class="alert warn">🔥 Suhu Melebihi Threshold</div>':
'<div class="alert ok">✅ Sistem Normal</div>';

c.data.labels=d.history.map(x=>x.t);
c.data.datasets[0].data=d.history.map(x=>x.s);
c.data.datasets[1].data=d.history.map(x=>x.h);
c.update();

logs.innerHTML=d.history.slice().reverse().slice(0,10).map(x=>
`<tr><td>${x.t}</td><td>${x.s}</td><td>${x.h}</td></tr>`).join('');
}
th.onchange=()=>fetch('/api/threshold',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({threshold:+th.value})});
load(); setInterval(load,2000);
</script>
</body></html>
