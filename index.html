
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IoT Dashboard V2</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="sidebar">
<h2>⚡ IoT V2</h2>
<div>Dashboard</div>
<div>Devices</div>
<div>Alerts</div>
<div>Settings</div>
</div>

<div class="main">
<h1>Smart Monitoring</h1>

<div class="cards">
<div class="card"><span>Suhu</span><h2 id="suhu">--</h2></div>
<div class="card"><span>Humidity</span><h2 id="hum">--</h2></div>
<div class="card"><span>Voltage</span><h2 id="volt">--</h2></div>
<div class="card"><span>Power</span><h2 id="power">--</h2></div>
<div class="card"><span>Battery</span><h2 id="battery">95%</h2></div>
<div class="card"><span>WiFi</span><h2 id="wifi">--</h2></div>
</div>

<div class="panel">
<canvas id="chart"></canvas>
</div>

<div class="grid">
<div class="panel">
<h3>Alert Center</h3>
<div id="alert"></div>
</div>

<div class="panel">
<h3>Threshold</h3>
<input id="threshold" type="range" min="25" max="35" step="0.5">
<p id="thresholdText"></p>
</div>
</div>

<div class="panel">
<h3>Realtime Logs</h3>
<table>
<thead><tr><th>Time</th><th>Suhu</th><th>Humidity</th></tr></thead>
<tbody id="logs"></tbody>
</table>
</div>
</div>

<script>
const chart=new Chart(document.getElementById('chart'),{
type:'line',
data:{labels:[],datasets:[
{label:'Suhu',data:[]},
{label:'Humidity',data:[]}
]}
});

async function load(){
const r=await fetch('/api/status');
const d=await r.json();

suhu.innerText=d.suhu+'°C';
hum.innerText=d.kelembapan+'%';
volt.innerText=d.voltage.toFixed(1)+'V';
power.innerText=d.power.toFixed(0)+'W';
wifi.innerText=d.wifi.toFixed(0)+' dBm';

threshold.value=d.threshold;
thresholdText.innerText='Threshold '+d.threshold+'°C';

alert.innerHTML=d.suhu>d.threshold
?'<div class="danger">🔥 Suhu Tinggi</div>'
:'<div class="ok">✅ Normal</div>';

chart.data.labels=d.history.map(x=>x.time);
chart.data.datasets[0].data=d.history.map(x=>x.suhu);
chart.data.datasets[1].data=d.history.map(x=>x.kelembapan);
chart.update();

logs.innerHTML=d.history.slice(-10).reverse()
.map(x=>`<tr><td>${x.time}</td><td>${x.suhu}</td><td>${x.kelembapan}</td></tr>`).join('');
}

threshold.onchange=async()=>{
await fetch('/api/threshold',{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({threshold:parseFloat(threshold.value)})
});
};

load();
setInterval(load,2000);
</script>
</body>
</html>
