<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>IoTherm • Dashboard Suhu Cerdas</title>
  <!-- Font Awesome 6 & Google Fonts -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="dashboard">
    <!-- HEADER -->
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon"><i class="fas fa-thermometer-half"></i></div>
        <div class="title">
          <h2>IoTherm Pro</h2>
          <div style="font-size:0.8rem; color:#6b95c5;">Smart Temperature Control</div>
        </div>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span> <span id="connectionStatus">Terhubung</span>
      </div>
      <div class="time-display" id="liveTime">--</div>
    </div>

    <!-- KARTU STATISTIK -->
    <div class="stats-grid">
      <div class="card">
        <div class="card-info">
          <h4><i class="fas fa-temperature-low" style="margin-right:5px;"></i>Suhu Saat Ini</h4>
          <div class="card-value"><span id="currentTempDisplay">28.4</span><span class="unit">°C</span></div>
        </div>
        <div class="card-icon"><i class="fas fa-thermometer-full"></i></div>
      </div>
      <div class="card">
        <div class="card-info">
          <h4><i class="fas fa-bullseye"></i> Target</h4>
          <div class="card-value"><span id="targetTempDisplay">24.0</span><span class="unit">°C</span></div>
        </div>
        <div class="card-icon"><i class="fas fa-sliders-h"></i></div>
      </div>
      <div class="card">
        <div class="card-info">
          <h4><i class="fas fa-snowflake"></i> Mode</h4>
          <div class="card-value" style="font-size:1.9rem;" id="modeDisplay">❄️ Dingin</div>
        </div>
        <div class="card-icon"><i class="fas fa-cog"></i></div>
      </div>
    </div>

    <!-- BAGIAN UTAMA: GRAFIK + KONTROL -->
    <div class="main-panel">
      <div class="chart-container">
        <div class="chart-header">
          <h3><i class="fas fa-chart-line" style="margin-right:8px;"></i>Riwayat Suhu (menit terakhir)</h3>
          <span style="font-size:0.8rem; color:#89b5f0;"><i class="far fa-clock"></i> real-time</span>
        </div>
        <canvas id="temperatureChart" width="400" height="180"></canvas>
      </div>

      <!-- PANEL KONTROL SUHU OTOMATIS -->
      <div class="control-panel">
        <div class="thermostat-ring">
          <span style="font-size:0.9rem; color:#b8d6ff;">SUHU RUANGAN</span>
          <div class="big-temp" id="bigCurrentTemp">28.4°</div>
        </div>

        <div class="target-row">
          <i class="fas fa-thermometer-half"></i>
          <span style="color:#bdd6ff;">Target:</span>
          <span class="target-value" id="controlTargetValue">24.0°C</span>
        </div>

        <div class="btn-group">
          <button class="temp-btn" id="decreaseTargetBtn">−</button>
          <button class="temp-btn" id="increaseTargetBtn">+</button>
        </div>

        <div class="mode-switch" id="modeSelector">
          <div class="mode-option active" data-mode="cool">❄️ Dingin</div>
          <div class="mode-option" data-mode="heat">🔥 Panas</div>
          <div class="mode-option" data-mode="auto">🤖 Auto</div>
        </div>

        <div class="automation-indicator">
          <i class="fas fa-robot" style="color:#4da6ff;"></i>
          <span style="flex:1;">Kendali Otomatis</span>
          <label class="switch">
            <input type="checkbox" id="autoToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
        <div class="footer-note">
          <i class="fas fa-shield-alt"></i> Sistem menyesuaikan otomatis
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      // ---------- STATE SIMULASI IOT ----------
      let currentTemp = 28.4;
      let targetTemp = 24.0;
      let mode = 'cool';
      let automationEnabled = true;

      const maxDataPoints = 20;
      let temperatureHistory = Array(maxDataPoints).fill(currentTemp);
      let timeLabels = Array(maxDataPoints).fill('');

      function updateTimeLabels() {
        const now = new Date();
        for (let i = 0; i < maxDataPoints; i++) {
          let d = new Date(now - (maxDataPoints - 1 - i) * 3000);
          timeLabels[i] = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
      }
      updateTimeLabels();

      // CHART JS
      const ctx = document.getElementById('temperatureChart').getContext('2d');
      let tempChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: timeLabels,
          datasets: [{
            label: 'Suhu (°C)',
            data: temperatureHistory,
            borderColor: '#3b9eff',
            backgroundColor: 'rgba(0, 160, 255, 0.08)',
            borderWidth: 2.5,
            pointBackgroundColor: '#ffffff',
            pointBorderColor: '#0077ff',
            pointRadius: 2.5,
            pointHoverRadius: 6,
            tension: 0.25,
            fill: true,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { mode: 'index', intersect: false }
          },
          scales: {
            y: {
              beginAtZero: false,
              min: 15,
              max: 40,
              grid: { color: '#1e3c5c' },
              ticks: { callback: (val) => val + '°C', color: '#b0cce8' }
            },
            x: {
              grid: { color: '#1b3250' },
              ticks: { color: '#9bb9e0', maxTicksLimit: 6 }
            }
          }
        }
      });

      function updateAllUI() {
        document.getElementById('currentTempDisplay').textContent = currentTemp.toFixed(1);
        document.getElementById('targetTempDisplay').textContent = targetTemp.toFixed(1);
        document.getElementById('bigCurrentTemp').textContent = currentTemp.toFixed(1) + '°';
        document.getElementById('controlTargetValue').textContent = targetTemp.toFixed(1) + '°C';

        const modeDisplay = document.getElementById('modeDisplay');
        if (mode === 'cool') modeDisplay.innerHTML = '❄️ Dingin';
        else if (mode === 'heat') modeDisplay.innerHTML = '🔥 Panas';
        else if (mode === 'auto') modeDisplay.innerHTML = '🤖 Auto';

        document.getElementById('autoToggle').checked = automationEnabled;

        document.querySelectorAll('.mode-option').forEach(btn => {
          const btnMode = btn.getAttribute('data-mode');
          if (btnMode === mode) {
            btn.classList.add('active');
          } else {
            btn.classList.remove('active');
          }
        });

        document.getElementById('connectionStatus').innerText = 'Terhubung';
      }

      function updateChart() {
        tempChart.data.labels = timeLabels;
        tempChart.data.datasets[0].data = temperatureHistory;
        tempChart.update();
      }

      function pushTemperatureData(temp) {
        temperatureHistory.push(temp);
        if (temperatureHistory.length > maxDataPoints) temperatureHistory.shift();
        const now = new Date();
        timeLabels.push(now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
        if (timeLabels.length > maxDataPoints) timeLabels.shift();
        updateChart();
      }

      function applyAutomation() {
        if (!automationEnabled) return;

        const diff = targetTemp - currentTemp;
        let adjustment = 0;

        if (mode === 'cool') {
          if (currentTemp > targetTemp) adjustment = -0.3;
          else if (currentTemp < targetTemp - 0.2) adjustment = +0.1;
        } else if (mode === 'heat') {
          if (currentTemp < targetTemp) adjustment = +0.3;
          else if (currentTemp > targetTemp + 0.2) adjustment = -0.1;
        } else if (mode === 'auto') {
          if (Math.abs(diff) > 0.2) {
            adjustment = diff > 0 ? -0.25 : +0.25;
          } else {
            adjustment = (Math.random() * 0.1 - 0.05);
          }
        }

        adjustment += (Math.random() * 0.2 - 0.1);
        let newTemp = currentTemp + adjustment;
        newTemp = Math.min(38, Math.max(16, newTemp));
        currentTemp = Math.round(newTemp * 10) / 10;
      }

      function environmentalEffect() {
        if (!automationEnabled) {
          let drift = (Math.random() * 0.2) - 0.1;
          if (mode === 'cool') drift -= 0.05;
          if (mode === 'heat') drift += 0.05;
          currentTemp = Math.min(38, Math.max(16, currentTemp + drift));
          currentTemp = Math.round(currentTemp * 10) / 10;
        }
      }

      // EVENT HANDLER
      document.getElementById('increaseTargetBtn').addEventListener('click', () => {
        if (targetTemp < 35) {
          targetTemp = Math.round((targetTemp + 0.5) * 10) / 10;
          updateAllUI();
        }
      });

      document.getElementById('decreaseTargetBtn').addEventListener('click', () => {
        if (targetTemp > 17) {
          targetTemp = Math.round((targetTemp - 0.5) * 10) / 10;
          updateAllUI();
        }
      });

      document.querySelectorAll('.mode-option').forEach(btn => {
        btn.addEventListener('click', function() {
          const selectedMode = this.getAttribute('data-mode');
          if (selectedMode) {
            mode = selectedMode;
            updateAllUI();
          }
        });
      });

      document.getElementById('autoToggle').addEventListener('change', function(e) {
        automationEnabled = e.target.checked;
        updateAllUI();
      });

      function updateClock() {
        const now = new Date();
        document.getElementById('liveTime').textContent = now.toLocaleTimeString('id-ID', {
          hour: '2-digit', minute: '2-digit', second: '2-digit'
        }) + ' WIB';
      }
      setInterval(updateClock, 1000);
      updateClock();

      function simulationStep() {
        applyAutomation();
        environmentalEffect();
        pushTemperatureData(currentTemp);
        updateAllUI();
      }

      temperatureHistory = Array(maxDataPoints).fill(currentTemp);
      updateTimeLabels();
      updateChart();
      updateAllUI();

      setInterval(simulationStep, 3000);

      setTimeout(() => {
        pushTemperatureData(currentTemp);
        updateAllUI();
      }, 200);
    })();
  </script>
</body>
</html>
