
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>IoT Admin Dashboard Pro</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="sidebar">
<div class="logo">⚡ IoT Admin</div>
<div class="menu">
<a href="#">🏠 Dashboard</a>
<a href="#">📡 Devices</a>
<a href="#">📈 Analytics</a>
<a href="#">🔔 Alerts</a>
<a href="#">⚙ Settings</a>
</div>
</div>

<div class="main">
<div class="topbar">
<h1>Smart Factory Monitoring</h1>
<div>🟢 Online</div>
</div>

<div class="cards">
<div class="card blue"><div>Temperature</div><div id="temp" class="value">--</div></div>
<div class="card pink"><div>Humidity</div><div id="hum" class="value">--</div></div>
<div class="card green"><div>Voltage</div><div id="volt" class="value">--</div></div>
<div class="card orange"><div>Power</div><div id="power" class="value">--</div></div>
</div>

<div class="grid">
<div class="panel">
<h3>Realtime Monitoring</h3>
<canvas id="chart"></canvas>
</div>

<div class="panel">
<h3>Device Status</h3>
<div class="status">ESP32-01 🟢 Online</div>
<div class="status">ESP32-02 🟢 Online</div>
<div class="status">Sensor Hub 🟢 Active</div>
<p style="margin-top:15px">WiFi: <span id="wifi"></span></p>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h3>Latest Logs</h3>
<table>
<thead><tr><th>Time</th><th>Temp</th><th>Hum</th></tr></thead>
<tbody id="logs"></tbody>
</table>
</div>
</div>

<script>
const chart=new Chart(document.getElementById('chart'),{
type:'line',
data:{labels:[],datasets:[
{label:'Temperature',data:[],borderColor:'#06b6d4',tension:.4},
{label:'Humidity',data:[],borderColor:'#ec4899',tension:.4}
]}
});

async function load(){
const r=await fetch('/api/status');
const d=await r.json();

temp.innerText=d.temp+'°C';
hum.innerText=d.hum+'%';
volt.innerText=d.volt+'V';
power.innerText=d.power+'W';
wifi.innerText=d.wifi+' dBm';

chart.data.labels=d.history.map(x=>x.time);
chart.data.datasets[0].data=d.history.map(x=>x.temp);
chart.data.datasets[1].data=d.history.map(x=>x.hum);
chart.update();

logs.innerHTML=d.history.slice().reverse().slice(0,10)
.map(x=>`<tr><td>${x.time}</td><td>${x.temp}</td><td>${x.hum}</td></tr>`).join('');
}
load();setInterval(load,2000);
</script>

</body>
</html>
